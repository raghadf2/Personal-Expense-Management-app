<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>إدارة المصاريف الشخصية</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9fafb;
      color: #333;
      max-width: 480px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 700;
      font-size: 2.2rem;
      color: #0b3954;
    }

    form {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      flex: 1 1 140px;
      padding: 12px;
      border-radius: 8px;
      border: 1.5px solid #cbd5e1;
    }

    button {
      background-color: #3a86ff;
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
      max-height: 280px;
      overflow-y: auto;
      background: white;
      border-radius: 10px;
    }

    li {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .total {
      margin-top: 20px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>إدارة المصاريف</h2>

  <form id="expense-form">
    <input type="text" id="desc" placeholder="الوصف" required />
    <input type="number" id="amount" placeholder="المبلغ" required />
    <button type="submit">إضافة</button>
  </form>

  <ul id="expense-list"></ul>

  <div class="total">المجموع: 0 ر.س</div>

  <script>
    const form = document.getElementById("expense-form");
    const descInput = document.getElementById("desc");
    const amountInput = document.getElementById("amount");
    const expenseList = document.getElementById("expense-list");
    const totalDiv = document.querySelector(".total");

    let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

    function saveData() {
      localStorage.setItem("expenses", JSON.stringify(expenses));
    }

    function renderExpenses() {
      expenseList.innerHTML = "";

      expenses.forEach((expense, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
          ${expense.desc} - ${expense.amount.toFixed(2)} ر.س
        `;

        if (expense.amount > 100) {
          li.style.color = "red";
        }

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "حذف";
        deleteBtn.classList.add("delete-btn");

        deleteBtn.onclick = () => {
          if (confirm("متأكد تبغى تحذف؟")) {
            expenses.splice(index, 1);
            saveData();
            renderExpenses();
            updateTotal();
          }
        };

        li.appendChild(deleteBtn);
        expenseList.appendChild(li);
      });
    }

    function updateTotal() {
      const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
      totalDiv.textContent = `المجموع: ${total.toFixed(2)} ر.س`;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const desc = descInput.value.trim();
      const amount = parseFloat(amountInput.value);

      if (desc === "" || isNaN(amount) || amount <= 0) {
        alert("أدخل بيانات صحيحة");
        return;
      }

      expenses.push({ desc, amount });
      saveData();

      descInput.value = "";
      amountInput.value = "";
      descInput.focus();

      renderExpenses();
      updateTotal();
    });

    renderExpenses();
    updateTotal();
  </script>

</body>
</html>
